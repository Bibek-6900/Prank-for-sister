<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>अग्रजस्य सम्मानः🙇‍♂️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#632c2e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:white;
    font-size:2.8rem;
    margin-bottom:40px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

.buttons{
    position:relative;
    width:500px;
    height:250px;
    margin:auto;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

#yesBtn{
    background:#ff4d6d;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    position:absolute;
    background:white;
    color:#ff4d6d;
    left:300px;
    top:100px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Dada Lai samman Garna sikha hai nani 😘</h1>

    <div class="buttons">
        <button id="yesBtn">Namaste Dada 🙏</button>
        <button id="noBtn">Gardina 👅</button>
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const container = document.querySelector(".buttons");

// Make the No button run away before it can be clicked
document.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();

    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const distance = Math.sqrt(
        (e.clientX - centerX) ** 2 +
        (e.clientY - centerY) ** 2
    );

    if(distance < 100){

        const maxX = container.clientWidth - noBtn.offsetWidth;
        const maxY = container.clientHeight - noBtn.offsetHeight;

        let randomX = Math.random() * maxX;
        let randomY = Math.random() * maxY;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }
});

yesBtn.addEventListener("click", () => {

    document.body.innerHTML = `
    <style>
    body{
        margin:0;
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff5f9e,#ffc1d9);
    }

    .message{
        text-align:center;
        color:white;
        font-size:4rem;
        font-weight:bold;
        animation:glow 1s infinite alternate;
        z-index:100;
    }

    @keyframes glow{
        from{
            text-shadow:0 0 10px white,
                        0 0 20px pink;
        }
        to{
            text-shadow:0 0 20px white,
                        0 0 40px hotpink,
                        0 0 60px hotpink;
        }
    }

    .heart{
        position:absolute;
        animation:float 6s linear forwards;
    }

    @keyframes float{
        from{
            transform:translateY(0);
            opacity:1;
        }
        to{
            transform:translateY(-120vh);
            opacity:0;
        }
    }
    </style>

    <div class="message">
         Vagya mani vayes Nani🫶
        <br>
        ❤️ ALU Khauuu Nani ❤️
    </div>
    `;

    setInterval(() => {

        const heart = document.createElement("div");

        heart.classList.add("heart");

        const hearts = ["❤️","💖","💕","💗","💘","💝","😘"];

        heart.innerHTML =
            hearts[Math.floor(Math.random() * hearts.length)];

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";
        heart.style.fontSize = (20 + Math.random() * 40) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);

    }, 200);
});
</script>

</body>
</html>
